info:
  name: Create Position
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/positions"
  body:
    type: json
    data: |-
      {
        "position_name" : "Test Position", 
        "base_salary" : "10", 
        "department_id" : "1", 
        "job_allowance" : "10"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
