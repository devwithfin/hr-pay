info:
  name: Create Allowance
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/allowances"
  body:
    type: json
    data: |-
      {
        "allowance_name" : "Test Allowance", 
        "is_fixed" : "true", 
        "default_amount" : "0"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
