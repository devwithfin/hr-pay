info:
  name: Get All Overtime Rates
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/overtime-rates?page=1&limit=10"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
