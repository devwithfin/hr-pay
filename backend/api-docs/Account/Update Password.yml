info:
  name: Update Password
  type: http
  seq: 2

http:
  method: PUT
  url: "{{baseUrl}}/users/1"
  body:
    type: json
    data: |-
      {
        "password" : "password123"
      }
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
