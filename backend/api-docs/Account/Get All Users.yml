info:
  name: Get All Users
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/users?page=1&limit=40"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "40"
      type: query
  auth:
    type: bearer
    token: "{{jwtToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
